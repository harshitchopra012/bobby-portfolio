<svg xmlns="http://www.w3.org/2000/svg" width="640" height="800" viewBox="0 0 640 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140707"/>
      <stop offset="1" stop-color="#070202"/>
    </linearGradient>
    <linearGradient id="duo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2a3a"/>
      <stop offset="0.55" stop-color="#b3001e"/>
      <stop offset="1" stop-color="#ff5e36"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.38" r="0.5">
      <stop offset="0" stop-color="#ff2a3a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff2a3a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>

  <rect width="640" height="800" fill="url(#bg)"/>
  <ellipse cx="320" cy="300" rx="260" ry="260" fill="url(#halo)"/>

  <!-- stylised editorial portrait silhouette -->
  <g filter="url(#soft)">
    <!-- shoulders -->
    <path d="M120 800 C120 600 200 540 320 540 C440 540 520 600 520 800 Z" fill="url(#duo)" opacity="0.9"/>
    <!-- neck -->
    <rect x="285" y="470" width="70" height="90" rx="30" fill="url(#duo)" opacity="0.9"/>
    <!-- head -->
    <ellipse cx="320" cy="360" rx="120" ry="140" fill="url(#duo)"/>
    <!-- hair sweep -->
    <path d="M205 330 C205 230 280 200 320 200 C370 200 440 240 438 345 C420 300 380 285 330 290 C270 296 235 320 205 360 Z" fill="#050505" opacity="0.35"/>
  </g>

  <!-- inner shadow to give depth on face -->
  <ellipse cx="320" cy="360" rx="120" ry="140" fill="#050505" opacity="0.18"/>

  <!-- frame line -->
  <rect x="14" y="14" width="612" height="772" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <text x="40" y="760" font-family="Syne, sans-serif" font-weight="800" font-size="40" fill="#f4f5fa">BC</text>
</svg>
